<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Empleados - Auxiliares</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #fafafa;
        }

        .btn-inicio {
            background-color: #e65100;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            background-color: white;
            width: auto;
            height: max-content;
        }

        th, td {
            border: 1px solid #ffe0b2; 
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #ff9800; 
            color: white;
        }

        tr:nth-child(even) {
            background-color: #fff3e0;
        }

        .contenedor {
            display: flex;
            gap: 20px;
        }

        .formulario {
            width: 280px; 
            background-color: white;
            padding: 15px;
            border: 1px solid #ffe0b2;
            border-radius: 4px;
        }

        .formulario label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .formulario input {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border: 1px solid #ffe0b2;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-agregar {
            background-color: #ff9800;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 15px;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-inicio">Inicio</a>

    <h1>Control de Empleados (Auxiliares)</h1>

    <div class="contenedor">
        
        <div class="formulario">
            <h3>Nuevo Auxiliar</h3>
            <form id="formAuxiliar">
                <label>ID:</label>
                <input type="text" id="idAuxiliar" placeholder="Ej: A1">

                <label>Nombre y Apellido:</label>
                <input type="text" id="nombre" placeholder="Ej: Alexis omar">

                <label>Ocupación:</label>
                <input type="text" id="ocupacion" placeholder="Ej: Aseo">

                <label>Horario:</label>
                <input type="text" id="horario" placeholder="Ej: 6am - 12pm">

                <label>Dirección:</label>
                <input type="text" id="direccion" placeholder="Ej: C. Colina 1350">

                <label>Teléfono:</label>
                <input type="text" id="telefono" placeholder="Ej: 656-1234567">

                <label>CURP:</label>
                <input type="text" id="curp" placeholder="Ej: AIOM6319S1">

                <button type="button" class="btn-agregar" onclick="agregarFila()">Agregar</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre y Apellido</th>
                    <th>Ocupación</th>
                    <th>Horario</th>
                    <th>Dirección</th>
                    <th>Teléfono</th>
                    <th>CURP</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
            </tbody>
        </table>

    </div>

    <script>
        function agregarFila() {
            var idAuxiliar = document.getElementById("idAuxiliar").value;
            var nombre = document.getElementById("nombre").value;
            var ocupacion = document.getElementById("ocupacion").value;
            var horario = document.getElementById("horario").value;
            var direccion = document.getElementById("direccion").value;
            var telefono = document.getElementById("telefono").value;
            var curp = document.getElementById("curp").value;

            var tabla = document.getElementById("cuerpoTabla");

            var nuevaFila = "<tr>" +
                                "<td>" + idAuxiliar + "</td>" +
                                "<td>" + nombre + "</td>" +
                                "<td>" + ocupacion + "</td>" +
                                "<td>" + horario + "</td>" +
                                "<td>" + direccion + "</td>" +
                                "<td>" + telefono + "</td>" +
                                "<td>" + curp + "</td>" +
                            "</tr>";

            tabla.innerHTML = tabla.innerHTML + nuevaFila;

            document.getElementById("formAuxiliar").reset();
        }
    </script>

</body>
</html>
