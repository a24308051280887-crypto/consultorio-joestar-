<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Control de Pacientes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: #fafafa;
        }

        .btn-inicio {
            background-color: #d81b60;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            display: inline-block;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            background-color: white;
            width: auto;
            height: max-content;
        }

        th, td {
            border: 1px solid #f8bbd0;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #e91e63; 
            color: white;
        }

        tr:nth-child(even) {
            background-color: #fce4ec;
        }

        .contenedor {
            display: flex;
            gap: 20px;
        }

        .formulario {
            width: 280px; 
            background-color: white;
            padding: 15px;
            border: 1px solid #f8bbd0;
            border-radius: 4px;
        }

        .formulario label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
            font-size: 14px;
        }

        .formulario input {
            width: 100%;
            padding: 6px;
            margin-top: 5px;
            border: 1px solid #f8bbd0;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-agregar {
            background-color: #e91e63;
            color: white;
            border: none;
            padding: 10px;
            margin-top: 15px;
            width: 100%;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-inicio">Inicio</a>

    <h1>Control de Pacientes</h1>

    <div class="contenedor">
        
        <div class="formulario">
            <h3>Nuevo Paciente</h3>
            <form id="formPaciente">
                <label>ID:</label>
                <input type="text" id="idPaciente" placeholder="Ej: 00001">

                <label>Nombre y Apellido:</label>
                <input type="text" id="nombre" placeholder="Ej: Maria lopez">

                <label>Fecha Nacimiento:</label>
                <input type="text" id="fechaNac" placeholder="Ej: 1998/08/12">

                <label>Género:</label>
                <input type="text" id="genero" placeholder="Ej: Mujer">

                <label>Teléfono:</label>
                <input type="text" id="telefono" placeholder="Ej: 656-1234567">

                <label>Correo:</label>
                <input type="text" id="correo" placeholder="Ej: marialopez@gmail.com">

                <label>Tipo Sangre:</label>
                <input type="text" id="tipoSangre" placeholder="Ej: A">

                <label>Alergias:</label>
                <input type="text" id="alergias" placeholder="Ej: NO">

                <button type="button" class="btn-agregar" onclick="agregarFila()">Agregar</button>
            </form>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre y Apellido</th>
                    <th>Fecha Nacimiento</th>
                    <th>Género</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th>Tipo Sangre</th>
                    <th>Alergias</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla">
            </tbody>
        </table>

    </div>

    <script>
        function agregarFila() {
            var idPaciente = document.getElementById("idPaciente").value;
            var nombre = document.getElementById("nombre").value;
            var fechaNac = document.getElementById("fechaNac").value;
            var genero = document.getElementById("genero").value;
            var telefono = document.getElementById("telefono").value;
            var correo = document.getElementById("correo").value;
            var tipoSangre = document.getElementById("tipoSangre").value;
            var allergies = document.getElementById("alergias").value;

            var tabla = document.getElementById("cuerpoTabla");

            var nuevaFila = "<tr>" +
                                "<td>" + idPaciente + "</td>" +
                                "<td>" + nombre + "</td>" +
                                "<td>" + fechaNac + "</td>" +
                                "<td>" + genero + "</td>" +
                                "<td>" + telefono + "</td>" +
                                "<td>" + correo + "</td>" +
                                "<td>" + tipoSangre + "</td>" +
                                "<td>" + allergies + "</td>" +
                            "</tr>";

            tabla.innerHTML = tabla.innerHTML + nuevaFila;

            document.getElementById("formPaciente").reset();
        }
    </script>

</body>
</html>
